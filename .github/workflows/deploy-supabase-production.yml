name: Deploy Supabase Production

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/**'
      - 'admin-web/scripts/bootstrap-admin.mjs'
      - '.github/workflows/deploy-supabase-production.yml'
  workflow_dispatch:

concurrency:
  group: deploy-supabase-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Apply schema, seed, functions, and admin bootstrap
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_ADMIN_EMAIL: ${{ secrets.SUPABASE_ADMIN_EMAIL }}
      SUPABASE_ADMIN_PASSWORD: ${{ secrets.SUPABASE_ADMIN_PASSWORD }}
      SUPABASE_ADMIN_FULL_NAME: ${{ secrets.SUPABASE_ADMIN_FULL_NAME }}
      SUPABASE_ADMIN_PHONE: ${{ secrets.SUPABASE_ADMIN_PHONE }}
      SUPABASE_URL: https://${{ secrets.SUPABASE_PROJECT_REF }}.supabase.co
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: admin-web/package-lock.json

      - name: Install admin dependencies
        working-directory: admin-web
        run: npm ci

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        working-directory: supabase
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF" -p "$SUPABASE_DB_PASSWORD" --yes

      - name: Apply migrations and seed data
        working-directory: supabase
        run: supabase db push --linked --include-seed --include-all -p "$SUPABASE_DB_PASSWORD"

      - name: Deploy edge functions
        working-directory: supabase
        run: |
          supabase functions deploy create-order --project-ref "$SUPABASE_PROJECT_REF" --use-api
          supabase functions deploy update-order-status --project-ref "$SUPABASE_PROJECT_REF" --use-api
          supabase functions deploy register-device-token --project-ref "$SUPABASE_PROJECT_REF" --use-api

      - name: Ensure admin auth user and profile
        working-directory: admin-web
        run: node ./scripts/bootstrap-admin.mjs
