name: Deploy Supabase Production

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/**'
      - 'admin-web/scripts/bootstrap-admin.mjs'
      - '.github/workflows/deploy-supabase-production.yml'
  workflow_dispatch:

concurrency:
  group: deploy-supabase-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Apply schema, seed, functions, and admin bootstrap
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_ADMIN_EMAIL: ${{ secrets.SUPABASE_ADMIN_EMAIL }}
      SUPABASE_ADMIN_PASSWORD: ${{ secrets.SUPABASE_ADMIN_PASSWORD }}
      SUPABASE_ADMIN_FULL_NAME: ${{ secrets.SUPABASE_ADMIN_FULL_NAME }}
      SUPABASE_ADMIN_PHONE: ${{ secrets.SUPABASE_ADMIN_PHONE }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Normalize Supabase settings
        id: supabase
        shell: bash
        run: |
          raw_ref=""

          db_url="${SUPABASE_DB_URL}"
          db_url="${db_url#\"}"
          db_url="${db_url%\"}"

          if [[ -z "$db_url" ]]; then
            echo "::error::SUPABASE_DB_URL repository secret is missing. Add the Session pooler or direct Postgres connection string from Supabase Connect."
            exit 1
          fi

          extracted_ref=""
          if [[ "$db_url" =~ postgres\.([a-z]{20})[:@] ]]; then
            extracted_ref="${BASH_REMATCH[1]}"
          elif [[ "$db_url" =~ db\.([a-z]{20})\.supabase\.co ]]; then
            extracted_ref="${BASH_REMATCH[1]}"
          fi

          if [[ -n "$extracted_ref" ]]; then
            raw_ref="$extracted_ref"
          fi

          if [[ ! "$raw_ref" =~ ^[a-z]{20}$ ]]; then
            echo "::error::Could not resolve a valid 20-character Supabase project ref from SUPABASE_DB_URL."
            exit 1
          fi

          echo "project_ref=$raw_ref" >> "$GITHUB_OUTPUT"
          echo "supabase_url=https://$raw_ref.supabase.co" >> "$GITHUB_OUTPUT"
          echo "db_url=$db_url" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: admin-web/package-lock.json

      - name: Install admin dependencies
        working-directory: admin-web
        run: npm ci

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Apply migrations and seed data
        working-directory: supabase
        run: supabase db push --db-url "${{ steps.supabase.outputs.db_url }}" --include-seed --include-all

      - name: Deploy edge functions
        working-directory: supabase
        run: |
          supabase functions deploy create-order --project-ref "${{ steps.supabase.outputs.project_ref }}" --use-api
          supabase functions deploy list-kitchen-orders --project-ref "${{ steps.supabase.outputs.project_ref }}" --use-api
          supabase functions deploy update-order-status --project-ref "${{ steps.supabase.outputs.project_ref }}" --use-api
          supabase functions deploy register-device-token --project-ref "${{ steps.supabase.outputs.project_ref }}" --use-api
          supabase functions deploy delete-account --project-ref "${{ steps.supabase.outputs.project_ref }}" --use-api

      - name: Ensure admin auth user and profile
        working-directory: admin-web
        env:
          SUPABASE_URL: ${{ steps.supabase.outputs.supabase_url }}
        run: node ./scripts/bootstrap-admin.mjs
