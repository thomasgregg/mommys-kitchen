project_id = "mommys-kitchen"

[api]
enabled = true
port = 55421
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 55422
shadow_port = 55420
major_version = 15

[db.seed]
enabled = true
sql_paths = ["./seed/seed.sql"]

[studio]
enabled = true
port = 55423

[analytics]
enabled = false

[inbucket]
enabled = false

[realtime]
enabled = true

[storage]
enabled = true
file_size_limit = "10MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = [
  "mommyskitchen://auth/callback",
  "http://localhost:3000/auth/callback"
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[functions.create-order]
verify_jwt = false

[functions.update-order-status]
verify_jwt = false

[functions.register-device-token]
verify_jwt = false

[functions.delete-account]
verify_jwt = false

[functions.list-kitchen-orders]
verify_jwt = false
